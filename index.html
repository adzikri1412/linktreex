<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkTree Profesional</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js" defer></script>
</head>
<body class="bg-gray-950 text-white overflow-x-hidden">
    <!-- Particle Background -->
    <div id="particles-js"></div>
    
    <!-- Main Container -->
    <div class="container relative z-10 mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <header class="text-center mb-10 pt-8">
            <div class="profile-image mb-6">
                <img src="team-dev.jpg" 
                     alt="Profile" 
                     class="w-32 h-32 rounded-full mx-auto border-4 border-blue-400 shadow-xl shadow-blue-500/20">
            </div>
            <h1 class="text-4xl font-bold mb-2 text-blue-300">XenzzSettingsx</h1>
            <p class="text-xl text-blue-100 mb-4">Digital Marketer & Content Creator</p>
            <p class="text-gray-300 max-w-2xl mx-auto">I help businesses grow through effective digital strategies. Let's connect!</p>
        </header>

        <!-- Links Section -->
        <main class="mb-12">
            <div id="links-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Link Cards akan di-generate oleh JavaScript -->
            </div>
        </main>

        <!-- Footer -->
        <footer class="text-center py-8 border-t border-gray-800 border-opacity-50">
            <p class="text-gray-400 mb-4">© 2026 XenzzSettingsx. All rights reserved.</p>
            <div class="flex justify-center space-x-6">
                <a href="#" class="text-gray-400 hover:text-blue-400 transition-colors duration-300 hover:scale-110">
                    <i class="fab fa-twitter text-xl"></i>
                </a>
                <a href="https://www.tiktok.com/@xenzxsukamimisusu" class="text-gray-400 hover:text-blue-400 transition-colors duration-300 hover:scale-110">
                    <i class="fab fa-tiktok text-xl"></i>
                </a>
                <a href="https://discord.gg/va8cseeMdn" class="text-gray-400 hover:text-blue-400 transition-colors duration-300 hover:scale-110">
                    <i class="fab fa-discord text-xl"></i>
                </a>
            </div>
        </footer>
    </div>

    <!-- Particle.js library -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</body>
</html>
